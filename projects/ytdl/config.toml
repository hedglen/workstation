[paths]
download_dir = "%USERPROFILE%/Videos"

# Cookies (logged-in / restricted sites)
#
# Chrome on Windows locks its cookie DB; ChromeCookieUnlock (install-chrome-cookie-plugin.ps1)
# is best-effort and often still fails on current Chrome — use one of:
#
#   • Save Netscape cookies.txt as ./cookies.txt next to ytdl.py (used automatically; gitignored).
#   • Or set file = "…" below (paths relative to this folder are OK).
#   • Or quit every chrome.exe (Task Manager), then dl again.
#   • Or from_browser = "edge:Default" if you use Edge for that site.
#
# See https://github.com/yt-dlp/yt-dlp/issues/7271
#
# from_browser: chrome:Default, edge:Default, firefox:C:/path/to/profile, etc.
[cookies]
from_browser = "chrome:Default"
# file = "cookies.txt"

[defaults]
# best, audio, 1080, 720, 480
quality = "best"
# mp4, mkv, webm (video) | mp3, m4a, opus (audio)
format = "mp4"
# embed subtitles if available
subtitles = false
# embed thumbnail into audio files
embed_thumbnail = true
