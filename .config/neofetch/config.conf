# Neofetch Config
# Cyberpunk Neon Theme - Deep Vibrant Pops
# High vibrance and saturation for maximum cyberpunk aesthetic

# === Colors ===
# Using 24-bit RGB color codes for maximum vibrancy
# Cyberpunk palette: hot pink, electric cyan, deep purple

color0="#FF00FF"  # Magenta/Pink for user@host
color1="#00FFFF"  # Cyan for separator/underline
color2="#FF00FF"  # Magenta/Pink for OS
color3="#00FFFF"  # Cyan for Kernel
color4="#FF4500"  # Orange-Red for Uptime
color5="#9400D3"  # Deep Purple for Packages
color6="#00FFFF"  # Cyan for Shell
color7="#FFFFFF"  # White for CPU
color8="#FF00FF"  # Magenta for GPU

# === Layout ===
separator=""
spc=" "

# === Info Display ===
# Show everything with cyberpunk flair
print_info() {
    info "User" "$USER"
    info "OS" "$OSTYPE"
    info "Kernel" "$KERNEL_VERSION"
    info "Uptime" "$UPTIME"
    info "Packages" "$PACKAGES"
    info "Shell" "$SHELL"
    info "CPU" "$CPU"
    info "GPU" "$GPU"
    info "Memory" "$MEMORY"
}

# === Logo ===
# Custom cyberpunk-style logo
logo() {
    echo -e "${color1}  ____ _   _ _____ ____ _____ _   _  __        __"
    echo -e "${color1} |  _ \ | | | ____/ ___|_   _| | | | \ \      / /"
    echo -e "${color2} | |_) | | |  _| \___ \ | | | | | |  \ \ /\ / / "
    echo -e "${color1} |  __/| |_| |___ ___) || | | |_| |   \ V  V /  "
    echo -e "${color2} |_|    \___/|_____|____/ |_|  \___/     \_/\_/   "
}

# === Ascii Colors ===
# Make the ascii art pop with neon colors
ascii_colors=(color1 color2 color1 color2 color1 color2)
ascii_distro="Windows"

# === Bold ===
bold_on

# === Underline ===
underline_on

# === Image ===
# No image - keep it clean and text-focused for cyberpunk feel
image_backend=""
image_source=""

# === Bar ===
bar_char="▰"
bar_border="━"
bar_colors=(color1 color2 color1 color2)
bar_length=25
