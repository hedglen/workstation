# Neofetch Config
# Cyberpunk Neon Theme - Deep Vibrant Pops
# High vibrance and saturation for maximum cyberpunk aesthetic

# ============================================================
# TEXT COLORS
# ============================================================
# Order: title, @, underline, subtitle, colon, info
# Cyberpunk palette: hot pink (201), electric cyan (51), deep purple (165)
colors=(201 201 51 51 201 51)

# ============================================================
# ASCII LOGO COLORS
# ============================================================
ascii_colors=(201 51 201 51 201 51)
ascii_distro="Windows"
ascii_bold="on"

# ============================================================
# TEXT OPTIONS
# ============================================================
bold="on"
underline_enabled="on"
underline_char="─"

# ============================================================
# INFO
# ============================================================
print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
}

# ============================================================
# BAR COLORS
# ============================================================
bar_color_elapsed="201"
bar_color_total="51"

# ============================================================
# OTHER SETTINGS
# ============================================================
separator=""
spc=" "
color_blocks="off"
